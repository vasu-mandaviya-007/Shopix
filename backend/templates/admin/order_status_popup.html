{% extends "unfold/layouts/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        
        <div class="px-6 py-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
            <h3 class="text-lg font-bold text-gray-800">Update Order Status</h3>
            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">
                {{ orders|length }} Orders Selected
            </span>
        </div>

        <form method="POST" class="p-6">
            {% csrf_token %}
            
            {% for order in orders %}
                <input type="hidden" name="{{ action_checkbox_name }}" value="{{ order.pk }}">
            {% endfor %}
            <input type="hidden" name="action" value="update_status_popup">

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Select New Fulfillment Status</label>
                <select name="new_status" required class="w-full bg-white border border-gray-300 rounded-lg p-3 text-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
                    <option value="" disabled selected>-- Choose Status --</option>
                    <option value="Pending">🕒 Pending</option>
                    <option value="Shipped">🚚 Shipped</option>
                    <option value="Delivered">✅ Delivered</option>
                    <option value="Cancelled">❌ Cancelled</option>
                </select>
                <p class="mt-3 text-sm text-gray-500">
                    This will safely update the status for all selected orders at once.
                </p>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button type="button" onclick="window.history.back();" class="px-5 py-2.5 text-sm font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-all">
                    Cancel
                </button>
                <button type="submit" name="apply" class="px-5 py-2.5 text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 rounded-lg shadow-sm transition-all">
                    Confirm Update
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
